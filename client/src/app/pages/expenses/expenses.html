<div class="container mt-5">

  <div class="card p-4 shadow-sm">

    <h3 class="mb-4">
      Add Expense
    </h3>

    <form
      (ngSubmit)="submit()">

      <div class="mb-3">

        <label>
          Amount
        </label>

        <input
          type="number"
          class="form-control"
          [(ngModel)]="expense.amount"
          name="amount">
      </div>

      <div class="mb-3">

        <label>
          Category
        </label>

        <select
          class="form-control"
          [(ngModel)]="expense.category"
          name="category">

          <option value="">
            Select Category
          </option>

          <option
            *ngFor="let c of categories"
            [value]="c">

            {{ c }}

          </option>

        </select>

      </div>

      <div class="mb-3">

        <label>
          Date
        </label>

        <input
          type="date"
          class="form-control"
          [(ngModel)]="expense.date"
          name="expense_date">
      </div>

      <div class="mb-3">

        <label>
          Note
        </label>

        <textarea
          class="form-control"
          [(ngModel)]="expense.note"
          name="note">
        </textarea>

      </div>

      <button
        class="btn btn-primary">

        Save Expense

      </button>

    </form>

  </div>

</div>
