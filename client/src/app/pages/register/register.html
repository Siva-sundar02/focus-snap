<div class="container py-5">

  <div class="row justify-content-center">

    <div class="col-md-5">

      <div class="card shadow-sm border-0">

        <div class="card-body p-4">

          <h2 class="fw-bold mb-4 text-center">
            Create Account
          </h2>

          <div
            *ngIf="error"
            class="alert alert-danger">

            {{ error }}

          </div>

          <form
            (ngSubmit)="register()">

            <div class="mb-3">

              <label class="form-label">
                Name
              </label>

              <input
                type="text"
                class="form-control"
                [(ngModel)]="formData.name"
                name="name"
                required>

            </div>

            <div class="mb-3">

              <label class="form-label">
                Email
              </label>

              <input
                type="email"
                class="form-control"
                [(ngModel)]="formData.email"
                name="email"
                required>

            </div>

            <div class="mb-4">

              <label class="form-label">
                Password
              </label>

              <input
                type="password"
                class="form-control"
                [(ngModel)]="formData.password"
                name="password"
                required>

            </div>

            <button
              class="btn btn-primary w-100">

              Register

            </button>

          </form>

          <p class="text-center mt-4 mb-0">

            Already have an account?

            <a routerLink="/login">
              Login
            </a>

          </p>

        </div>

      </div>

    </div>

  </div>

</div>
