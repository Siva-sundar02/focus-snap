<div class="container py-5">

  <div class="app-header">

  <div class="app-logo">

    💰

  </div>

  <div>

    <h1 class="app-title">

      SnapExpense

    </h1>

    <p class="app-tagline">

      Track what you spend,
      understand where it goes.

    </p>

  </div>

</div>

  <div class="row justify-content-center">

    <div class="col-md-5">

      <div class="card shadow-sm border-0">

        <div class="card-body p-4">

          <h2 class="fw-bold mb-4 text-center">
            Login
          </h2>

          <form
            (ngSubmit)="login()">

            <div class="mb-3">

              <label class="form-label">
                Email
              </label>

              <input
                type="email"
                class="form-control"
                [(ngModel)]="email"
                name="email"
                required>

            </div>

            <div class="mb-4">

              <label class="form-label">
                Password
              </label>

              <input
                type="password"
                class="form-control"
                [(ngModel)]="password"
                name="password"
                required>

            </div>

            <button
              class="btn btn-primary w-100">

              Login

            </button>

          </form>

          <p class="text-center mt-4 mb-0">

            Don't have an account?

            <a routerLink="/register">

              Register

            </a>

          </p>

        </div>

      </div>

    </div>

  </div>

</div>
